<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Portal — Login</title>
  <link rel="stylesheet" href="/index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }
    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--residential));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-inverse);
      margin: 0 auto 16px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .login-title span {
      color: var(--accent);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: all var(--transition-fast);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn-block {
      width: 100%;
      justify-content: center;
      padding: 12px 16px;
      font-size: 14px;
      margin-top: 12px;
    }
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">P</div>
      <h1 class="login-title">Proxy <span>Portal</span></h1>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-input" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login</button>
      <div class="error-msg" id="errorMsg">Invalid credentials.</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      errorMsg.style.display = 'none';
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (res.ok) {
          window.location.href = '/';
        } else {
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
